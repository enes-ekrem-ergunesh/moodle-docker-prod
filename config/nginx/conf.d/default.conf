# HTTP Server (proxied by host nginx with SSL)
server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /var/www/html;
    index index.php index.html;

    # Moodle specific locations
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP handling
    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass moodle:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param HTTP_HOST $http_host;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PORT $http_x_forwarded_port;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        # This container always sits behind host TLS termination.
        # Force HTTPS context for Moodle to avoid redirect loops
        # when upstream/proxy headers are inconsistent.
        fastcgi_param HTTPS on;
        fastcgi_param SERVER_PORT 443;
        fastcgi_param REQUEST_SCHEME https;
        fastcgi_read_timeout 3600;
        fastcgi_connect_timeout 3600;
        fastcgi_send_timeout 3600;
        fastcgi_buffer_size 256k;
        fastcgi_buffers 512 32k;
        fastcgi_busy_buffers_size 512k;
        fastcgi_temp_file_write_size 512k;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Deny direct access to sensitive files
    location ~ ^/(config\.php|install\.php|version\.php)$ {
        deny all;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Moodle dataroot should not be accessible
    location /moodledata {
        internal;
    }
}
