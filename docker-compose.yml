services:
  # MySQL Database
  db:
    image: mysql:${MYSQL_VERSION:-5.7.33}
    container_name: moodle_db
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./config/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
      - ./backup/database:/docker-entrypoint-initdb.d:ro
    networks:
      - moodle_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  # PHP-FPM with Moodle
  moodle:
    build:
      context: ./docker/php
      args:
        PHP_VERSION: ${PHP_VERSION:-7.4}
        MOODLE_VERSION: ${MOODLE_VERSION:-3.11}
        PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-4096M}
        PHP_UPLOAD_MAX_FILESIZE: ${PHP_UPLOAD_MAX_FILESIZE:-2048M}
        PHP_POST_MAX_SIZE: ${PHP_POST_MAX_SIZE:-2048M}
        PHP_MAX_EXECUTION_TIME: ${PHP_MAX_EXECUTION_TIME:-3600}
        TIMEZONE: ${TIMEZONE:-UTC}
    container_name: moodle_app
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
      ENABLE_SSL: ${ENABLE_SSL:-true}
      MYSQL_HOST: db
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MOODLE_ADMIN_USER: ${MOODLE_ADMIN_USER:-admin}
      MOODLE_ADMIN_PASSWORD: ${MOODLE_ADMIN_PASSWORD}
      MOODLE_ADMIN_EMAIL: ${MOODLE_ADMIN_EMAIL}
      MOODLE_SITE_FULLNAME: ${MOODLE_SITE_FULLNAME:-My Moodle Site}
      MOODLE_SITE_SHORTNAME: ${MOODLE_SITE_SHORTNAME:-Moodle}
      TIMEZONE: ${TIMEZONE:-UTC}
      RESTORE_MODE: ${RESTORE_MODE:-false}
    volumes:
      - ./backup/moodle:/var/www/html
      - ./backup/moodledata:/var/www/moodledata
    networks:
      - moodle_network
    depends_on:
      db:
        condition: service_healthy

  # Nginx Web Server (internal, exposed to host nginx via port)
  nginx:
    image: nginx:alpine
    container_name: moodle_nginx
    restart: unless-stopped
    ports:
      - "${MOODLE_PORT:-8080}:80"
    volumes:
      - ./backup/moodle:/var/www/html:ro
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - moodle_network
    depends_on:
      - moodle

  # Cron for Moodle scheduled tasks
  cron:
    build:
      context: ./docker/php
      args:
        PHP_VERSION: ${PHP_VERSION:-7.4}
        MOODLE_VERSION: ${MOODLE_VERSION:-3.11}
        PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-4096M}
        PHP_UPLOAD_MAX_FILESIZE: ${PHP_UPLOAD_MAX_FILESIZE:-2048M}
        PHP_POST_MAX_SIZE: ${PHP_POST_MAX_SIZE:-2048M}
        PHP_MAX_EXECUTION_TIME: ${PHP_MAX_EXECUTION_TIME:-3600}
        TIMEZONE: ${TIMEZONE:-UTC}
    container_name: moodle_cron
    restart: unless-stopped
    entrypoint: /usr/local/bin/cron-entrypoint.sh
    environment:
      DOMAIN: ${DOMAIN}
      ENABLE_SSL: ${ENABLE_SSL:-true}
      MYSQL_HOST: db
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TIMEZONE: ${TIMEZONE:-UTC}
    volumes:
      - ./backup/moodle:/var/www/html
      - ./backup/moodledata:/var/www/moodledata
    networks:
      - moodle_network
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:

networks:
  moodle_network:
    driver: bridge
